name: 🐛 Bug Report
description: Report a bug in agentic-dna
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `dna --version`"
    validations:
      required: true
